name: Run Test

on: [push, pull_request]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubunutu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@4
      - name: Setup Python
        uses: actions/setup_python@v5
        with:
          python-version: '3.14.3'
      - name: Install Dependencies
        run: pip install -r requirements-dev.txt
      - name: Check linting
        run: flake8 .
      - name: Run Test
        run: pytest
